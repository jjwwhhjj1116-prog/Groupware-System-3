<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>groupware-system-3-</title>
    <script>
      window.addEventListener('error', (event) => {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.maxHeight = '50vh';
        div.style.overflowY = 'auto';
        div.style.backgroundColor = '#ff4d4f';
        div.style.color = 'white';
        div.style.zIndex = '999999';
        div.style.padding = '20px';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
        div.innerText = `🚨 [클라이언트 런타임 에러 감지]\n메시지: ${event.message}\n위치: ${event.filename}:${event.lineno}:${event.colno}\n\nStack:\n${event.error?.stack || '스택 정보 없음'}`;
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', (event) => {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.maxHeight = '50vh';
        div.style.overflowY = 'auto';
        div.style.backgroundColor = '#ff7a45';
        div.style.color = 'white';
        div.style.zIndex = '999999';
        div.style.padding = '20px';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
        div.innerText = `🚨 [비동기 프로미스 에러 감지]\n이유: ${event.reason}\n\nStack:\n${event.reason?.stack || '스택 정보 없음'}`;
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
